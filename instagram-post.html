<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rihlah Instagram Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .post {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(160deg, #050a08 0%, #081710 20%, #0b2319 45%, #0e3625 70%, #115a3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 0 80px;
    }

    .post::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(212, 165, 116, 0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(4, 120, 87, 0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(4, 120, 87, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.01) 0%, transparent 70%);
      pointer-events: none;
    }

    .post::after {
      content: '';
      position: absolute;
      top: 36px; left: 36px; right: 36px; bottom: 36px;
      border: 1px solid rgba(255, 255, 255, 0.035);
      border-radius: 2px;
      pointer-events: none;
    }

    /* === TOP: Arabic === */
    .top-section {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 130px;
    }

    .arabic {
      font-size: 120px;
      color: #fff;
      font-weight: 300;
      letter-spacing: 8px;
      direction: rtl;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 100px rgba(4, 120, 87, 0.25);
    }

    .accent-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.7), transparent);
      margin-bottom: 20px;
    }

    .meaning-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .transliteration {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .meaning-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(212, 165, 116, 0.4);
    }

    .meaning-word {
      font-size: 18px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 8px;
      text-transform: uppercase;
      font-style: italic;
    }

    /* === CENTER: Text === */
    .middle-section {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: auto;
      margin-bottom: auto;
    }

    .inspirational {
      font-size: 34px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      line-height: 1.9;
      letter-spacing: 0.5px;
      max-width: 620px;
    }

    .inspirational em {
      font-style: normal;
      color: rgba(212, 165, 116, 0.9);
      font-weight: 500;
    }

    /* === BOTTOM: Wordmark === */
    .bottom-section {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 110px;
    }

    .wordmark {
      font-size: 64px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 12px;
      text-transform: lowercase;
    }

    .tagline {
      margin-top: 16px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 6px;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <div class="post">

    <!-- TOP: Arabic script -->
    <div class="top-section">
      <div class="arabic">رِحْلَة</div>
      <div class="accent-line"></div>
      <div class="meaning-row">
        <span class="transliteration">Rihlah</span>
        <span class="meaning-dot"></span>
        <span class="meaning-word">Journey</span>
      </div>
    </div>

    <!-- CENTER: Emotional hook -->
    <div class="middle-section">
      <div class="inspirational">
        Travel with purpose.<br>
        Explore. Learn. <em>Grow.</em>
      </div>
    </div>

    <!-- BOTTOM: Wordmark -->
    <div class="bottom-section">
      <div class="wordmark">Rihlah</div>
      <div class="tagline">Muslim Travel Community</div>
    </div>

  </div>
</body>
</html>
